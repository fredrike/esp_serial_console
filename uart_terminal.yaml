esphome:
  name: uart-terminal
  platform: ESP32
  board: wemos_d1_mini32

# Pull custom component from GitHub repository
external_components:
  - source:
      type: git
      url: git@github.com:fredrike/esp_serial_console.git
    components: [ uart_terminal ]

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "UART Terminal Fallback"
    password: "fallback123"

captive_portal:

# Enable logging
logger:
  level: INFO
  baud_rate: 0  # Disable UART logging since we're using it for terminal

# Enable Home Assistant API
api:
  password: !secret api_password

# Enable OTA updates
ota:
  password: !secret ota_password

# Web server for the terminal interface
web_server:
  port: 80
  
# UART configuration
uart:
  id: uart_bus
  tx_pin: GPIO1
  rx_pin: GPIO3
  baud_rate: 115200

# Serial terminal component from GitHub
uart_terminal:
  uart_id: uart_bus
